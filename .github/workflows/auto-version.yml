name: Auto Version & Tag

# Runs after every merge to master.
# Computes the next yyyy.MM.count tag and pushes it, which in turn
# triggers the Build & Release workflow to produce a signed APK.
#
# Tag format:  v2026.05.1, v2026.05.2, v2026.06.1, …
# versionCode: injected by release.yml from total tag count + base

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    # Skip commits created by this workflow (e.g. bot commits marked [skip ci])
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so we can list existing tags

      - name: Compute next version tag
        id: version
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%m)
          PREFIX="v${YEAR}.${MONTH}."
          # Find the highest counter already used for this month
          LAST=$(git tag -l "${PREFIX}*" | sed "s|${PREFIX}||" | sort -n | tail -1)
          if [ -z "$LAST" ]; then COUNT=1; else COUNT=$((LAST + 1)); fi
          TAG="${PREFIX}${COUNT}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Next tag: ${TAG}"

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
