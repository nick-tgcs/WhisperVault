name: Auto Version & Tag

# Manual fallback for creating a yyyy.MM.count tag.
# Automatic tag creation on master is owned by release.yml to avoid
# duplicate or racing tag pushes when both workflows are active.
#
# Tag format:  v2026.05.1, v2026.05.2, v2026.06.1, …
# versionCode: injected by release.yml from total tag count + base

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so we can list existing tags

      - name: Compute next version tag
        id: version
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%m)
          PREFIX="v${YEAR}.${MONTH}."
          # Find the highest counter already used for this month
          LAST=$(git tag -l "${PREFIX}*" | sed "s|${PREFIX}||" | sort -n | tail -1)
          if [ -z "$LAST" ]; then COUNT=1; else COUNT=$((LAST + 1)); fi
          TAG="${PREFIX}${COUNT}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Next tag: ${TAG}"

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
