name: Build & Release

# Triggers:
#   1. pull_request closed+merged to master  → primary auto-release path
#   2. push of a v* tag                      → explicit tag fallback
#   3. workflow_dispatch                      → manual; pass a tag or leave blank to auto-compute
#
# Why pull_request instead of push to master: GitHub unreliably delivered
# push events in this repo (PR #4, PR #7 both silently dropped). The
# pull_request closed+merged event is a first-class dedicated webhook — far
# more reliable. The scheduled watchdog (release-watchdog.yml) is a backstop
# in case this event also misfires.
#
# A guard job checks for unreleased commits before building so that concurrent
# trigger firings (e.g. watchdog dispatch + pull_request event) never
# double-bump the version. The concurrency group serialises them; the guard
# ensures the second one exits cleanly once the first has tagged HEAD.
#
# Why combined: GITHUB_TOKEN-pushed tags cannot trigger other workflows, so
# everything must stay in one workflow.

on:
  pull_request:
    branches: [master]
    types: [closed]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2026.05.1). Leave blank to auto-compute.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  guard:
    name: Check for unreleased commits
    runs-on: ubuntu-latest
    # Ignore PR closes that weren't merges
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/heads/master
          fetch-depth: 0

      - name: Check for unreleased commits
        id: check
        run: |
          # Tag pushes and explicit-tag dispatches are always intentional — skip guard
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag push — releasing unconditionally."
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Explicit-tag dispatch — releasing unconditionally."
            exit 0
          fi
          # For PR merge or blank dispatch: skip if HEAD is already tagged
          LATEST_TAG=$(git tag -l 'v[0-9][0-9][0-9][0-9].*' | sort -V | tail -1)
          if [[ -z "$LATEST_TAG" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No release tags yet — proceeding with first release."
            exit 0
          fi
          UNRELEASED=$(git rev-list "${LATEST_TAG}..HEAD" --count)
          echo "Unreleased commits since ${LATEST_TAG}: ${UNRELEASED}"
          if [[ "$UNRELEASED" -gt 0 ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "HEAD is already released — skipping build."
          fi

  release:
    name: Build & Release
    needs: guard
    if: needs.guard.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    # Serialize so concurrent triggers (e.g. watchdog dispatch + pull_request event)
    # don't race to create the same tag; cancel-in-progress false so the second
    # run still executes and exits cleanly via the guard
    concurrency:
      group: release
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
          submodules: true
          fetch-depth: 0   # full history needed to enumerate tags

      - name: Resolve or compute version tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            # Manual dispatch with an explicit tag — validate format and existence
            TAG="${{ inputs.tag }}"
            if [[ ! "$TAG" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]+$ ]]; then
              echo "::error::Invalid tag format '${TAG}'. Expected vYYYY.MM.N (e.g. v2026.05.1)."
              exit 1
            fi
            if ! git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "::error::Tag '${TAG}' does not exist. Push the tag first or leave the input blank to auto-compute."
              exit 1
            fi
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            # Triggered by a tag push
            TAG="${GITHUB_REF#refs/tags/}"
          else
            # Auto-compute next vYYYY.MM.N tag for PR merge or blank dispatch
            YEAR=$(date -u +%Y)
            MONTH=$(date -u +%m)
            PREFIX="v${YEAR}.${MONTH}."
            LAST=$(git tag -l "${PREFIX}*" | sed "s|${PREFIX}||" | sort -n | tail -1)
            if [ -z "$LAST" ]; then COUNT=1; else COUNT=$((LAST + 1)); fi
            TAG="${PREFIX}${COUNT}"
            # Push the tag (GITHUB_TOKEN pushes don't re-trigger workflows)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Releasing: ${TAG}"

      - name: Checkout tagged commit (explicit-tag dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: git checkout "${{ steps.tag.outputs.tag }}"

      - name: Set version in build.gradle
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          BASE_VERSION_CODE=17
          # Count only vYYYY.* tags (4-digit year) — excludes legacy v1.7
          RELEASE_COUNT=$(git tag -l "v[0-9][0-9][0-9][0-9].*" | wc -l)
          NEW_VERSION_CODE=$((BASE_VERSION_CODE + RELEASE_COUNT))
          sed -i "s/versionCode [0-9]*/versionCode ${NEW_VERSION_CODE}/" app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${VERSION}\"/" app/build.gradle
          echo "versionName=${VERSION} versionCode=${NEW_VERSION_CODE}"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/app/whispervault-release.jks"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/whispervault-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true