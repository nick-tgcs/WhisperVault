name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0   # full history so we can count tags for versionCode

      - name: Set version from tag
        run: |
          # TAG_VERSION e.g. "2026.05.3"  (strips the leading 'v')
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          # versionCode = base-17 (last manual code) + number of vYYYY.MM.N tags so far
          BASE_VERSION_CODE=17
          RELEASE_COUNT=$(git tag -l "v[0-9]*" | wc -l)
          NEW_VERSION_CODE=$((BASE_VERSION_CODE + RELEASE_COUNT))
          sed -i "s/versionCode [0-9]*/versionCode ${NEW_VERSION_CODE}/" app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${TAG_VERSION}\"/" app/build.gradle
          echo "Building versionName=${TAG_VERSION} versionCode=${NEW_VERSION_CODE}"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/app/whispervault-release.jks"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/whispervault-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true